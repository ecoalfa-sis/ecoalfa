        authDomain: "ecoalfa-6f9d1.firebaseapp.com",

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          renderLogin();
          return;
        }
        currentUser = user;
        try {
          const profileSnap = await getDoc(doc(db, "users", user.uid));
          currentUserProfile = profileSnap.exists() ? profileSnap.data() : null;
          if (!isAuthorized(currentUserProfile)) {
            await signOut(auth);
            renderLogin("No tienes permisos para acceder a esta sección.");
            return;
          }
          await loadConfig();
          renderAdmin();
        } catch (error) {
          console.error("Error verificando usuario", error);
          renderLogin("No fue posible verificar tu perfil. Intenta de nuevo.");
        }
      });

      function isAuthorized(profile) {
        if (!profile) return false;
        return profile.active === true && (profile.role === "admin" || profile.role === "medico");
      }

      function renderLogin(errorMessage = "") {
        appContainer.innerHTML = `
          <main class="grid min-h-screen place-items-center p-6">
            <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-lg ring-1 ring-slate-200">

                <h1 class="text-2xl font-bold text-slate-900">Administración Ecoalfa</h1>
                <p class="mt-2 text-sm text-slate-500">Solo administradores y médicos pueden ingresar.</p>
              </div>
              <form id="login-form" class="space-y-4">
                <div>
                  <label class="mb-1 block text-sm font-medium text-slate-700">Correo electrónico</label>
                  <input id="login-email" type="email" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                </div>
                <div>
                  <label class="mb-1 block text-sm font-medium text-slate-700">Contraseña</label>
                  <input id="login-password" type="password" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                </div>
                ${errorMessage ? `<p class="rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700">${errorMessage}</p>` : ""}
                <button type="submit" class="w-full rounded-xl bg-emerald-700 px-4 py-3 font-semibold text-white transition hover:bg-emerald-800">Ingresar</button>
              </form>
            </div>
          </main>
        `;

        document.getElementById("login-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;
          try {
            await signInWithEmailAndPassword(auth, email, password);
          } catch (error) {
            const messages = {
              "auth/invalid-email": "Correo inválido.",
              "auth/user-not-found": "Usuario no encontrado.",
              "auth/wrong-password": "Contraseña incorrecta.",
              "auth/invalid-credential": "Credenciales incorrectas.",
              "auth/user-disabled": "Usuario deshabilitado."
            };
            renderLogin(messages[error.code] || "Error al iniciar sesión.");
          }
        });
      }

      async function loadConfig() {
        const configRef = doc(db, "config", "siteConfig");
        const snapshot = await getDoc(configRef);
        currentConfig = snapshot.exists() ? { ...DEFAULT_CONFIG, ...snapshot.data() } : { ...DEFAULT_CONFIG };

        promoMediaItems = await loadMediaByKind("promo");
        galleryMediaItems = await loadMediaByKind("gallery");

        if (promoMediaItems.length === 0 && Array.isArray(currentConfig.promoItems) && currentConfig.promoItems.length) {
          await seedLegacyMedia("promo", currentConfig.promoItems);
          promoMediaItems = await loadMediaByKind("promo");
        }
        if (galleryMediaItems.length === 0 && Array.isArray(currentConfig.galleryItems) && currentConfig.galleryItems.length) {
          await seedLegacyMedia("gallery", currentConfig.galleryItems);
          galleryMediaItems = await loadMediaByKind("gallery");
        }

        currentConfig.promoItems = promoMediaItems;
        currentConfig.galleryItems = galleryMediaItems;
      }

      async function saveConfig() {
        const payload = {
          companyName: document.getElementById("cfg-companyName").value.trim(),
          slogan: document.getElementById("cfg-slogan").value.trim(),
          phone: document.getElementById("cfg-phone").value.trim(),
          whatsappNumber: document.getElementById("cfg-whatsappNumber").value.trim(),
          email: document.getElementById("cfg-email").value.trim(),
          address: document.getElementById("cfg-address").value.trim(),
          timezone: document.getElementById("cfg-timezone").value.trim(),
          heroTitle: document.getElementById("cfg-heroTitle").value.trim(),
          heroHighlight: document.getElementById("cfg-heroHighlight").value.trim(),
          heroDescription: document.getElementById("cfg-heroDescription").value.trim(),
          primaryButtonText: document.getElementById("cfg-primaryButtonText").value.trim(),
          secondaryButtonText: document.getElementById("cfg-secondaryButtonText").value.trim(),
          ctaTitle: document.getElementById("cfg-ctaTitle").value.trim(),
          ctaDescription: document.getElementById("cfg-ctaDescription").value.trim(),
          showPromoModal: document.getElementById("cfg-showPromoModal").checked,
          promoAutoPlay: document.getElementById("cfg-promoAutoPlay").checked,
          promoInterval: Number(document.getElementById("cfg-promoInterval").value) || 5000,
          plansSectionTitle: document.getElementById("cfg-plansSectionTitle").value.trim(),
          plansSectionDescription: document.getElementById("cfg-plansSectionDescription").value.trim(),
          plansButtonText: document.getElementById("cfg-plansButtonText").value.trim(),
          plansWhatsAppNumber: document.getElementById("cfg-plansWhatsAppNumber").value.trim(),
          plansWhatsAppMessage: document.getElementById("cfg-plansWhatsAppMessage").value.trim(),
          plans: sanitizePlans(readPlansConfig())
        };

        const configRef = doc(db, "config", "siteConfig");
        await setDoc(configRef, {
          ...payload,
          updatedAt: serverTimestamp(),
          updatedBy: {
            uid: currentUser?.uid || "",
            name: currentUserProfile?.displayName || currentUser?.email || ""
          }
        }, { merge: true });

        currentConfig = { ...payload, promoItems: promoMediaItems, galleryItems: galleryMediaItems };
        showMessage("Configuración guardada correctamente.", "success");
      }

            <div class="space-y-3">

                <label class="mb-1 block text-xs font-medium text-slate-600">Nombre del plan</label>
                <input id="cfg-plan-${index}-name" value="${escapeHtml(plan.name || "")}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Precio</label>
                <input id="cfg-plan-${index}-price" value="${escapeHtml(plan.price || "")}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Descripción</label>
                <input id="cfg-plan-${index}-description" value="${escapeHtml(plan.description || "")}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Beneficios (uno por línea)</label>
                <textarea id="cfg-plan-${index}-features" rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">${escapeHtml(plan.featuresText || (plan.features || []).join("\n"))}</textarea>
              </div>
            </div>
          </div>
        `).join("");
      }

      function readPlansConfig() {
        const plans = [];
        for (let i = 0; i < 3; i++) {
          const name = document.getElementById(`cfg-plan-${i}-name`)?.value.trim() || "";
          const price = document.getElementById(`cfg-plan-${i}-price`)?.value.trim() || "";
          const description = document.getElementById(`cfg-plan-${i}-description`)?.value.trim() || "";
          const featuresText = document.getElementById(`cfg-plan-${i}-features`)?.value.trim() || "";
          plans.push({ id: currentConfig?.plans?.[i]?.id || `plan-${i + 1}`, name, price, description, featuresText });
        }
        return plans;
      }

      async function loadMediaByKind(kind) {
        const fsSnap = await getDocs(collection(db, "siteMedia"));
        const fsItems = fsSnap.docs
          .map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }))
          .filter((item) => item.kind === kind);
        const rtdbSnap = await get(child(dbRef(rtdb), `siteMedia/${kind}`));
        const rtdbItems = rtdbSnap.exists()
          ? Object.entries(rtdbSnap.val()).map(([id, item]) => ({ id, ...item, source: "rtdb" }))
          : [];
        return [...fsItems, ...rtdbItems].sort((a, b) => (a.position || 0) - (b.position || 0));
      }

      async function seedLegacyMedia(kind, items) {
        const cleanItems = sanitizeMediaItems(items);
        await Promise.all(cleanItems.map((item, index) => addDoc(collection(db, "siteMedia"), {
          ...item,
          kind,
          position: Date.now() + index
        })));
      }

      function sanitizeMediaItems(items) {
        return (items || []).map((item) => ({
          url: String(item?.url || ""),
          name: String(item?.name || ""),
          type: String(item?.type || "image"),
          ...(typeof item?.originalUrl === "string" ? { originalUrl: item.originalUrl } : {}),
          ...(typeof item?.size === "number" ? { size: item.size } : {})
        })).filter((item) => item.url);
      }

      function sanitizePlans(plans) {
        return (plans || []).map((plan, index) => ({
          id: String(plan?.id || `plan-${index + 1}`),
          name: String(plan?.name || ""),
          price: String(plan?.price || ""),
          description: String(plan?.description || ""),
          featuresText: String(plan?.featuresText || "")
        }));
      }

                  <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
                    <h2 class="text-lg font-bold text-slate-900">Modal publicitario</h2>
                    <p class="mt-1 text-sm text-slate-500">Imágenes y videos que aparecerán en un modal al abrir la landing page.</p>

                    <div class="mt-5 space-y-4">
                      <label class="flex items-center gap-3 text-sm text-slate-700">
                        <input id="cfg-showPromoModal" type="checkbox" ${cfg.showPromoModal ? "checked" : ""} class="h-4 w-4 rounded border-slate-300 text-emerald-600" />
                        Mostrar modal al cargar la landing
                      </label>
                      <label class="flex items-center gap-3 text-sm text-slate-700">
                        <input id="cfg-promoAutoPlay" type="checkbox" ${cfg.promoAutoPlay ? "checked" : ""} class="h-4 w-4 rounded border-slate-300 text-emerald-600" />
                        Cambiar automáticamente de slide
                      </label>
                      <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Intervalo entre slides (ms)</label>
                        <input id="cfg-promoInterval" type="number" value="${cfg.promoInterval}" class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                      </div>

                      <div class="rounded-xl bg-blue-50 p-4 text-sm text-blue-800">
                        <strong>Opción rápida:</strong> pega una URL de imagen o video. Puedes subir tus archivos a GitHub, Imgur, Cloudinary, YouTube, etc. y pegar aquí el enlace.
                      </div>

                      <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">URL de imagen o video</label>
                        <input id="promo-url" type="text" placeholder="https://..." class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                        <p class="mt-1 text-xs text-slate-500">Videos de YouTube: usa la URL completa o la URL de embed.</p>
                      </div>
                      <button id="add-promo-url" class="w-full rounded-xl border border-emerald-700 px-4 py-2 text-sm font-semibold text-emerald-700 transition hover:bg-emerald-50">Agregar por URL</button>

                      <div class="border-t border-slate-200 pt-4">
                        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">O subir imagen/video directamente</p>
                        <div class="mt-2 rounded-xl bg-amber-50 p-3 text-xs text-amber-800">
                          Imágenes y videos subidos por archivo: se guardan en Realtime Database (base64, hasta 20 MB) sin pérdida de calidad. Se genera automáticamente una miniatura para videos. No expiran.
                        </div>
                        <div class="mt-2">
                          <input id="promo-files" type="file" accept="image/*,video/*" multiple class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm file:mr-4 file:rounded-lg file:border-0 file:bg-emerald-100 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-emerald-700" />
                        </div>
                        <button id="upload-promo" class="mt-2 w-full rounded-xl bg-emerald-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-800">Subir archivos</button>
                      </div>

                      <div id="promo-list" class="space-y-3">
                        ${renderPromoItems(cfg.promoItems, "promo")}
                      </div>
                    </div>
                  </div>

                  <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
                    <h2 class="text-lg font-bold text-slate-900">Galería de Nosotros</h2>
                    <p class="mt-1 text-sm text-slate-500">Imágenes y videos fijos que aparecen en la sección Nosotros de la landing.</p>

                    <div class="mt-5 space-y-4">
                      <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">URL de imagen o video</label>
                        <input id="gallery-url" type="text" placeholder="https://..." class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                      </div>
                      <button id="add-gallery-url" class="w-full rounded-xl border border-emerald-700 px-4 py-2 text-sm font-semibold text-emerald-700 transition hover:bg-emerald-50">Agregar por URL</button>

                      <div class="border-t border-slate-200 pt-4">
                        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">O subir archivo directamente</p>
                        <div class="mt-2">
                          <input id="gallery-files" type="file" accept="image/*,video/*" multiple class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm file:mr-4 file:rounded-lg file:border-0 file:bg-emerald-100 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-emerald-700" />
                        </div>
                        <button id="upload-gallery" class="mt-2 w-full rounded-xl bg-emerald-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-800">Subir archivos</button>
                      </div>

                      <div id="gallery-list" class="space-y-3">
                        ${renderPromoItems(cfg.galleryItems, "gallery")}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        `;

        bindAdminEvents();
      }

      function renderPromoItems(items, listType = "promo") {
        if (!items || items.length === 0) {
          return `<p class="text-sm text-slate-500">No hay elementos agregados.</p>`;
        }
        return items.map((item) => {
          let thumbnail = "";
          if (item.type === "video/youtube") {
            thumbnail = item.poster
              ? `<img src="${item.poster}" alt="" class="h-16 w-16 rounded-lg object-cover bg-slate-100" />`
              : `<div class="flex h-16 w-16 items-center justify-center rounded-lg bg-red-100 text-red-600 font-bold text-xs">YouTube</div>`;
          } else if (item.type?.startsWith("video")) {
            thumbnail = item.poster
              ? `<img src="${item.poster}" alt="" class="h-16 w-16 rounded-lg object-cover bg-slate-100" />`
              : `<div class="flex h-16 w-16 items-center justify-center rounded-lg bg-slate-100 text-slate-500 text-xs font-semibold">Video</div>`;
          } else {
            thumbnail = `<img src="${item.url}" alt="" class="h-16 w-16 rounded-lg object-cover" />`;
          }
          const removeAttr = listType === "promo" ? "data-remove-promo" : "data-remove-gallery";
          return `
            <div class="flex items-center gap-3 rounded-xl border border-slate-200 p-3">
              ${thumbnail}
              <div class="min-w-0 flex-1">
                <p class="truncate text-sm font-medium text-slate-900">${item.name}</p>
                <p class="text-xs text-slate-500">${item.type || "imagen"}</p>
              </div>
              <button ${removeAttr}="${item.id || ""}" class="rounded-lg px-2 py-1 text-sm font-medium text-red-600 hover:bg-red-50">Quitar</button>
            </div>
          `;
        }).join("");
      }

      function bindAdminEvents() {
        document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));
        document.getElementById("save-config").addEventListener("click", saveConfig);
        document.getElementById("upload-promo").addEventListener("click", uploadPromoFiles);
        document.getElementById("add-promo-url").addEventListener("click", addPromoUrl);
        document.getElementById("upload-gallery").addEventListener("click", uploadGalleryFiles);
        document.getElementById("add-gallery-url").addEventListener("click", addGalleryUrl);

        document.querySelectorAll("[data-remove-promo]").forEach((button) => {
          button.addEventListener("click", async () => {
            const id = button.dataset.removePromo;
            if (!id) return;
            const item = promoMediaItems.find((item) => item.id === id);
            if (item?.source === "rtdb") {
              try { await remove(dbRef(rtdb, `siteMedia/promo/${id}`)); } catch (e) { console.warn(e); }
            } else {
              await deleteDoc(doc(db, "siteMedia", id));
            }
            promoMediaItems = promoMediaItems.filter((item) => item.id !== id);
            currentConfig.promoItems = promoMediaItems;
            document.getElementById("promo-list").innerHTML = renderPromoItems(currentConfig.promoItems, "promo");
            bindAdminEvents();
          });
        });

        document.querySelectorAll("[data-remove-gallery]").forEach((button) => {
          button.addEventListener("click", async () => {
            const id = button.dataset.removeGallery;
            if (!id) return;
            const item = galleryMediaItems.find((item) => item.id === id);
            if (item?.source === "rtdb") {
              try { await remove(dbRef(rtdb, `siteMedia/gallery/${id}`)); } catch (e) { console.warn(e); }
            } else {
              await deleteDoc(doc(db, "siteMedia", id));
            }
            galleryMediaItems = galleryMediaItems.filter((item) => item.id !== id);
            currentConfig.galleryItems = galleryMediaItems;
            document.getElementById("gallery-list").innerHTML = renderPromoItems(currentConfig.galleryItems, "gallery");
            bindAdminEvents();
          });
        });

        document.getElementById("promo-files").addEventListener("change", (event) => {
          pendingPromoFiles = Array.from(event.target.files);
        });

        document.getElementById("gallery-files").addEventListener("change", (event) => {
          pendingGalleryFiles = Array.from(event.target.files);
        });
      }

      async function addPromoUrl() {
        const input = document.getElementById("promo-url");
        const url = input.value.trim();

        if (!url) {
          showMessage("Ingresa una URL válida.", "error");
          return;
        }

        if (!isValidUrl(url)) {
          showMessage("La URL no es válida.", "error");
          return;
        }

        const item = buildPromoItemFromUrl(url);
        const docRef = await addDoc(collection(db, "siteMedia"), {
          ...item,
          kind: "promo",
          position: Date.now()
        });
        const saved = { id: docRef.id, ...item, kind: "promo", position: Date.now() };
        promoMediaItems = [...promoMediaItems, saved];
        currentConfig.promoItems = promoMediaItems;
        document.getElementById("promo-list").innerHTML = renderPromoItems(currentConfig.promoItems, "promo");
        input.value = "";
        bindAdminEvents();
        showMessage("URL agregada correctamente.", "success");
      }

      async function addGalleryUrl() {
        const input = document.getElementById("gallery-url");
        const url = input.value.trim();
        if (!url || !isValidUrl(url)) {
          showMessage("Ingresa una URL válida.", "error");
          return;
        }
        const item = buildPromoItemFromUrl(url);
        const docRef = await addDoc(collection(db, "siteMedia"), {
          ...item,
          kind: "gallery",
          position: Date.now()
        });
        const saved = { id: docRef.id, ...item, kind: "gallery", position: Date.now() };
        galleryMediaItems = [...galleryMediaItems, saved];
        currentConfig.galleryItems = galleryMediaItems;
        document.getElementById("gallery-list").innerHTML = renderPromoItems(currentConfig.galleryItems, "gallery");
        input.value = "";
        bindAdminEvents();
        showMessage("URL de galería agregada.", "success");
      }

      async function uploadGalleryFiles() {
        if (!pendingGalleryFiles.length) {
          showMessage("Selecciona archivos.", "error");
          return;
        }
        const button = document.getElementById("upload-gallery");
        button.disabled = true;
        button.textContent = "Comprimiendo...";
        try {
          const uploads = await Promise.all(
            pendingGalleryFiles.map((file, index) => prepareMediaUpload(file, index, "gallery"))
          );
          const savedDocs = await Promise.all(
            uploads.map(async (item) => {
              const rtdbItemRef = push(dbRef(rtdb, "siteMedia/gallery"));
              await set(rtdbItemRef, { ...item, kind: "gallery" });
              return { id: rtdbItemRef.key, ...item, kind: "gallery", source: "rtdb" };
            })
          );
          galleryMediaItems = [...galleryMediaItems, ...savedDocs];
          currentConfig.galleryItems = galleryMediaItems;
          document.getElementById("gallery-list").innerHTML = renderPromoItems(currentConfig.galleryItems, "gallery");
          document.getElementById("gallery-files").value = "";
          pendingGalleryFiles = [];
          bindAdminEvents();
          showMessage("Archivos de galería guardados.", "success");
        } catch (error) {
          console.error(error);
          const msg = error?.message?.includes("muy grande") ? error.message : "Error subiendo a galería.";
          showMessage(msg, "error");
        } finally {
          button.disabled = false;
          button.textContent = "Subir archivos";
        }
      }

      function isValidUrl(string) {
        try {
          new URL(string);
          return true;
        } catch {
          return false;
        }
      }

      function buildPromoItemFromUrl(url) {
        const youtubeRegex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/;
        const match = url.match(youtubeRegex);
        if (match) {
          return {
            url: `https://www.youtube.com/embed/${match[1]}`,
            name: `YouTube video (${match[1]})`,
            type: "video/youtube",
            poster: `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg`,
            originalUrl: url
          };
        }
        const extension = url.split(".").pop().toLowerCase().split("?")[0];
        const videoTypes = ["mp4", "webm", "ogg", "mov"];
        const imageTypes = ["jpg", "jpeg", "png", "gif", "webp", "svg"];
        const type = videoTypes.includes(extension) ? "video/mp4" : imageTypes.includes(extension) ? "image" : "image";
        return { url, name: url.split("/").pop() || "Promoción", type };
      }

      async function uploadPromoFiles() {
        if (!pendingPromoFiles.length) {
          showMessage("Selecciona al menos un archivo.", "error");
          return;
        }

        const oversized = pendingPromoFiles.filter((file) => {
          if (file.type?.startsWith("video")) {
            return file.size > 20 * 1024 * 1024;
          }
          return file.size > 10 * 1024 * 1024;
        });
        if (oversized.length > 0) {
          showMessage("Algunos archivos son muy grandes: imágenes máx 10 MB, videos máx 20 MB.", "error");
          return;
        }

        const button = document.getElementById("upload-promo");
        button.disabled = true;
        button.textContent = "Comprimiendo...";

        try {
          const uploads = await Promise.all(
            pendingPromoFiles.map((file, index) => prepareMediaUpload(file, index, "promo"))
          );

          const savedDocs = await Promise.all(
            uploads.map(async (item) => {
              const rtdbItemRef = push(dbRef(rtdb, "siteMedia/promo"));
              await set(rtdbItemRef, { ...item, kind: "promo" });
              return { id: rtdbItemRef.key, ...item, kind: "promo", source: "rtdb" };
            })
          );

          promoMediaItems = [...promoMediaItems, ...savedDocs];
          currentConfig.promoItems = promoMediaItems;
          document.getElementById("promo-list").innerHTML = renderPromoItems(currentConfig.promoItems, "promo");
          document.getElementById("promo-files").value = "";
          pendingPromoFiles = [];
          bindAdminEvents();
          showMessage("Archivos guardados correctamente.", "success");
        } catch (error) {
          console.error("Error procesando archivos", error);
          const msg = error?.message?.includes("muy grande")
            ? error.message
            : "No fue posible procesar los archivos. Intenta con archivos más pequeños o con formato diferente.";
          showMessage(msg, "error");
        } finally {
          button.disabled = false;
          button.textContent = "Subir archivos";
        }
      }

      async function prepareMediaUpload(file, index, kind) {
        const isVideo = file.type?.startsWith("video");
        const item = {
          name: file.name,
          type: isVideo ? "video" : "image",
          position: Date.now() + index
        };
        if (isVideo) {
          item.poster = await createVideoPoster(file).catch(() => "");
        }
        const base64 = await readFileAsDataURL(file);
        if (typeof base64 !== "string" || !base64.startsWith("data:")) {
          throw new Error("El archivo no se convirtió correctamente.");
        }
        item.url = base64;
        item.size = base64.length;
        return item;
      }

      function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function createVideoPoster(file) {
        return new Promise((resolve) => {
          const objectUrl = URL.createObjectURL(file);
          const video = document.createElement("video");
          video.crossOrigin = "anonymous";
          video.muted = true;
          video.volume = 0;
          video.playsInline = true;
          video.preload = "auto";
          video.src = objectUrl;

          const cleanup = () => {
            try { URL.revokeObjectURL(objectUrl); } catch (e) {}
          };

          const captureFrame = (times) => {
            const time = times.shift();
            if (time === undefined) {
              cleanup();
              resolve("");
              return;
            }
            const onSeeked = () => {
              try {
                const w = video.videoWidth || 480;
                const h = video.videoHeight || 270;
                const scale = Math.min(1, 480 / Math.max(w, h));
                const canvas = document.createElement("canvas");
                canvas.width = Math.max(1, Math.round(w * scale));
                canvas.height = Math.max(1, Math.round(h * scale));
                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let sum = 0;
                for (let i = 0; i < data.length; i += 16) {
                  sum += data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                }
                if (sum / Math.max(1, data.length / 16) < 18) {
                  captureFrame(times);
                  return;
                }
                cleanup();
                resolve(canvas.toDataURL("image/jpeg", 0.8));
              } catch (error) {
                cleanup();
                resolve("");
              }
            };
            video.addEventListener("seeked", onSeeked, { once: true });
            try {
              video.currentTime = time;
            } catch (error) {
              video.removeEventListener("seeked", onSeeked);
              captureFrame(times);
            }
          };

          video.addEventListener("loadeddata", () => {
            const duration = Math.max(video.duration || 1, 1);
            captureFrame([
              Math.min(0.5, duration - 0.1),
              Math.min(1, duration - 0.1),
              Math.min(2, duration - 0.1),
              Math.min(3, duration - 0.1)
            ]);
          }, { once: true });
          video.addEventListener("error", () => {
            cleanup();
            resolve("");
          }, { once: true });
        });
      }

      function showMessage(message, type) {
        const box = document.getElementById("admin-message");
        if (!box) return;
        box.className = `rounded-xl px-4 py-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"}`;
        box.textContent = message;
        box.classList.remove("hidden");
      }

      function escapeHtml(text) {
        if (!text) return "";
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    </script>
