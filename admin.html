      const firebaseConfig = {
        apiKey: "AIzaSyBs85ZtM0tUI5XYypWTze-8xfPJj3EaV5g",
        authDomain: "ecoalfa-6f9d1.firebaseapp.com",
        projectId: "ecoalfa-6f9d1",
        storageBucket: "ecoalfa-6f9d1.firebasestorage.app",
        messagingSenderId: "760816764581",
        appId: "1:760816764581:web:31ef204b23ca5980852f4c",
        measurementId: "G-77WWNZFNY6"

      const auth = getAuth(app);
      const db = getFirestore(app);

      const appContainer = document.getElementById("app");

        phone: "322 897 1484",
        whatsappNumber: "573228971484",
        email: "",

        plansWhatsAppMessage: "Hola, quiero conocer más sobre el plan",

        facebookLandingSubtitle: "Productos naturales y atención médica personalizada",
        plans: [
          {

            name: "Plan Gold",
            price: "$99.000/mes",
            description: "Ideal para consultas básicas y acompañamiento mensual.",
            featuresText: "1 consulta médica al mes\nChat de soporte\nRecordatorios de medicación"

          {

            name: "Plan Premium",
            price: "$199.000/mes",

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          renderLogin();
          return;
        }
        currentUser = user;
        try {
          const profileSnap = await getDoc(doc(db, "users", user.uid));
          currentUserProfile = profileSnap.exists() ? profileSnap.data() : null;
          if (!isAuthorized(currentUserProfile)) {
            await signOut(auth);
            renderLogin("No tienes permisos para acceder a esta sección.");
            return;
          }
          await loadConfig();
          renderAdmin();
        } catch (error) {
          console.error("Error verificando usuario", error);
          renderLogin("No fue posible verificar tu perfil. Intenta de nuevo.");
        }
      });

      function isAuthorized(profile) {
        if (!profile) return false;
        return profile.active === true && (profile.role === "admin" || profile.role === "medico");
      }

      function renderLogin(errorMessage = "") {
        appContainer.innerHTML = `
          <main class="grid min-h-screen place-items-center p-6">
            <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-lg ring-1 ring-slate-200">
              <div class="mb-6 text-center">
                <h1 class="text-2xl font-bold text-slate-900">Administración Ecoalfa</h1>
                <p class="mt-2 text-sm text-slate-500">Solo administradores y médicos pueden ingresar.</p>
              </div>
              <form id="login-form" class="space-y-4">
                <div>
                  <label class="mb-1 block text-sm font-medium text-slate-700">Correo electrónico</label>
                  <input id="login-email" type="email" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                </div>
                <div>
                  <label class="mb-1 block text-sm font-medium text-slate-700">Contraseña</label>
                  <input id="login-password" type="password" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                </div>
                ${errorMessage ? `<p class="rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700">${errorMessage}</p>` : ""}
                <button type="submit" class="w-full rounded-xl bg-emerald-700 px-4 py-3 font-semibold text-white transition hover:bg-emerald-800">Ingresar</button>
              </form>
            </div>
          </main>
        `;

        document.getElementById("login-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;
          try {
            await signInWithEmailAndPassword(auth, email, password);
          } catch (error) {
            const messages = {
              "auth/invalid-email": "Correo inválido.",
              "auth/user-not-found": "Usuario no encontrado.",
              "auth/wrong-password": "Contraseña incorrecta.",
              "auth/invalid-credential": "Credenciales incorrectas.",
              "auth/user-disabled": "Usuario deshabilitado."
            };
            renderLogin(messages[error.code] || "Error al iniciar sesión.");
          }
        });
      }

      async function loadConfig() {
        const configRef = doc(db, "config", "siteConfig");
        const snapshot = await getDoc(configRef);
        currentConfig = snapshot.exists() ? { ...DEFAULT_CONFIG, ...snapshot.data() } : { ...DEFAULT_CONFIG };

        promoMediaItems = await loadMediaByKind("promo");
        galleryMediaItems = await loadMediaByKind("gallery");
        heroMediaItems = await loadMediaByKind("hero");
        storeMediaItems = await loadMediaByKind("store");

        currentConfig.promoItems = promoMediaItems;
        currentConfig.galleryItems = galleryMediaItems;
        currentConfig.heroItems = heroMediaItems;
        currentConfig.storeItems = storeMediaItems;
      }

      async function saveConfig() {
        const payload = {
          companyName: document.getElementById("cfg-companyName").value.trim(),
          slogan: document.getElementById("cfg-slogan").value.trim(),
          phone: document.getElementById("cfg-phone").value.trim(),
          whatsappNumber: document.getElementById("cfg-whatsappNumber").value.trim(),
          email: document.getElementById("cfg-email").value.trim(),
          address: document.getElementById("cfg-address").value.trim(),
          timezone: document.getElementById("cfg-timezone").value.trim(),
          heroTitle: document.getElementById("cfg-heroTitle").value.trim(),
          heroHighlight: document.getElementById("cfg-heroHighlight").value.trim(),
          heroDescription: document.getElementById("cfg-heroDescription").value.trim(),
          primaryButtonText: document.getElementById("cfg-primaryButtonText").value.trim(),
          secondaryButtonText: document.getElementById("cfg-secondaryButtonText").value.trim(),
          ctaTitle: document.getElementById("cfg-ctaTitle").value.trim(),
          ctaDescription: document.getElementById("cfg-ctaDescription").value.trim(),
          showPromoModal: document.getElementById("cfg-showPromoModal").checked,
          promoAutoPlay: document.getElementById("cfg-promoAutoPlay").checked,
          promoInterval: Number(document.getElementById("cfg-promoInterval").value) || 5000,
          plansSectionTitle: document.getElementById("cfg-plansSectionTitle").value.trim(),
          plansSectionDescription: document.getElementById("cfg-plansSectionDescription").value.trim(),
          plansButtonText: document.getElementById("cfg-plansButtonText").value.trim(),
          plansWhatsAppNumber: document.getElementById("cfg-plansWhatsAppNumber").value.trim(),
          plansWhatsAppMessage: document.getElementById("cfg-plansWhatsAppMessage").value.trim(),
          facebookLandingVideoUrl: document.getElementById("cfg-facebookLandingVideoUrl").value.trim(),
          facebookLandingFeaturedProduct: document.getElementById("cfg-facebookLandingFeaturedProduct").value.trim(),
          facebookLandingTitle: document.getElementById("cfg-facebookLandingTitle").value.trim(),
          facebookLandingSubtitle: document.getElementById("cfg-facebookLandingSubtitle").value.trim(),
          plans: sanitizePlans(readPlansConfig())
        };

        const configRef = doc(db, "config", "siteConfig");
        await setDoc(configRef, {
          ...payload,
          updatedAt: serverTimestamp(),
          updatedBy: {
            uid: currentUser?.uid || "",
            name: currentUserProfile?.displayName || currentUser?.email || ""
          },
          promoItems: deleteField(),
          galleryItems: deleteField(),
          heroItems: deleteField()
        }, { merge: true });

        currentConfig = { ...payload, promoItems: promoMediaItems, galleryItems: galleryMediaItems, heroItems: heroMediaItems, storeItems: storeMediaItems };
        showMessage("Configuración guardada correctamente.", "success");
      }

      function renderPlansConfig(plans) {

              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Precio</label>
                <input id="cfg-plan-${index}-price" value="${escapeHtml(plan.price || "")}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Descripción</label>
                <input id="cfg-plan-${index}-description" value="${escapeHtml(plan.description || "")}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Beneficios (uno por línea)</label>
                <textarea id="cfg-plan-${index}-features" rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">${escapeHtml(plan.featuresText || (plan.features || []).join("\n"))}</textarea>
              </div>
            </div>
          </div>
        `).join("");
      }

      function readPlansConfig() {
        const plans = [];
        for (let i = 0; i < 3; i++) {
          const name = document.getElementById(`cfg-plan-${i}-name`)?.value.trim() || "";
          const price = document.getElementById(`cfg-plan-${i}-price`)?.value.trim() || "";
          const description = document.getElementById(`cfg-plan-${i}-description`)?.value.trim() || "";
          const featuresText = document.getElementById(`cfg-plan-${i}-features`)?.value.trim() || "";
          plans.push({ id: currentConfig?.plans?.[i]?.id || `plan-${i + 1}`, name, price, description, featuresText });
        }
        return plans;
      }

      async function loadMediaByKind(kind) {
        const fsSnap = await getDocs(collection(db, "siteMedia"));
        const fsItems = fsSnap.docs
          .map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }))
          .filter((item) => item.kind === kind);
        const rtdbSnap = await get(child(dbRef(rtdb), `siteMedia/${kind}`));
        const rtdbItems = rtdbSnap.exists()
          ? Object.entries(rtdbSnap.val()).map(([id, item]) => ({ id, ...item, source: "rtdb" }))
          : [];
        return [...fsItems, ...rtdbItems].sort((a, b) => (a.position || 0) - (b.position || 0));
      }

      async function seedLegacyMedia(kind, items) {
        const cleanItems = sanitizeMediaItems(items);
        await Promise.all(cleanItems.map((item, index) => addDoc(collection(db, "siteMedia"), {
          ...item,
          kind,
          position: Date.now() + index
        })));
      }

      function sanitizeMediaItems(items) {
        return (items || []).map((item) => ({
          url: String(item?.url || ""),
          name: String(item?.name || ""),
          type: String(item?.type || "image"),
          ...(typeof item?.originalUrl === "string" ? { originalUrl: item.originalUrl } : {}),
          ...(typeof item?.size === "number" ? { size: item.size } : {})
        })).filter((item) => item.url);
      }

      function sanitizePlans(plans) {
        return (plans || []).map((plan, index) => ({
          id: String(plan?.id || `plan-${index + 1}`),
          name: String(plan?.name || ""),
          price: String(plan?.price || ""),
          description: String(plan?.description || ""),
          featuresText: String(plan?.featuresText || "")
        }));
      }

      function renderPromoItems(items, listType = "promo") {
        if (!items || items.length === 0) {
          return `<p class="text-sm text-slate-500">No hay elementos agregados.</p>`;
        }
        return items.map((item) => {
          let thumbnail = "";
          if (item.type === "video/youtube") {
            thumbnail = item.poster
              ? `<img src="${item.poster}" alt="" class="h-16 w-16 rounded-lg object-cover bg-slate-100" />`
              : `<div class="flex h-16 w-16 items-center justify-center rounded-lg bg-red-100 text-red-600 font-bold text-xs">YouTube</div>`;
          } else if (item.type?.startsWith("video")) {
            thumbnail = item.poster
              ? `<img src="${item.poster}" alt="" class="h-16 w-16 rounded-lg object-cover bg-slate-100" />`
              : `<div class="flex h-16 w-16 items-center justify-center rounded-lg bg-slate-100 text-slate-500 text-xs font-semibold">Video</div>`;
          } else {
            thumbnail = `<img src="${item.url}" alt="" class="h-16 w-16 rounded-lg object-cover" />`;
          }
          const removeAttr = listType === "promo" ? "data-remove-promo" : listType === "gallery" ? "data-remove-gallery" : "data-remove-hero";
          return `
            <div class="flex items-center gap-3 rounded-xl border border-slate-200 p-3">
              ${thumbnail}
              <div class="min-w-0 flex-1">
                <p class="truncate text-sm font-medium text-slate-900">${item.name}</p>
                <p class="text-xs text-slate-500">${item.type || "imagen"}</p>
              </div>
              <button ${removeAttr}="${item.id || ""}" class="rounded-lg px-2 py-1 text-sm font-medium text-red-600 hover:bg-red-50">Quitar</button>
            </div>
          `;
        }).join("");
      }

      function renderStoreItems(items) {
        if (!items || items.length === 0) {
          return `<p class="text-sm text-slate-500">No hay productos en la tienda.</p>`;
        }
        return items.map((item) => {
          const id = item.id || "";
          const source = item.source || "rtdb";
          return `
            <div class="rounded-xl border border-slate-200 p-3" data-store-item="${id}">
              <div class="flex items-center gap-3">
                <img src="${item.url}" alt="" class="store-item-img h-16 w-16 rounded-lg object-cover bg-slate-100" />
                <div class="min-w-0 flex-1">
                  <div class="flex items-center justify-between">
                    <p class="store-item-name truncate text-sm font-bold text-slate-900">${escapeHtml(item.name)}</p>
                    <p class="store-item-price text-sm font-semibold text-emerald-700">${escapeHtml(item.price)}</p>
                  </div>
                  <p class="store-item-desc truncate text-xs text-slate-500">${escapeHtml(item.description || "Sin descripción")}</p>
                </div>
                <button data-edit-store="${id}" class="rounded-lg px-2 py-1 text-sm font-medium text-blue-600 hover:bg-blue-50">Editar</button>
                <button data-remove-store="${id}" class="rounded-lg px-2 py-1 text-sm font-medium text-red-600 hover:bg-red-50">Quitar</button>
              </div>
              <div data-edit-form="${id}" class="hidden mt-4 border-t border-slate-200 pt-4 space-y-3">
                <div class="grid gap-3 sm:grid-cols-2">
                  <div>
                    <label class="mb-1 block text-xs font-medium text-slate-600">Nombre</label>
                    <input data-field="name" data-id="${id}" value="${escapeHtml(item.name)}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
                  </div>
                  <div>
                    <label class="mb-1 block text-xs font-medium text-slate-600">Precio</label>
                    <input data-field="price" data-id="${id}" value="${escapeHtml(item.price)}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
                  </div>
                </div>
                <div>
                  <label class="mb-1 block text-xs font-medium text-slate-600">Descripción</label>
                  <textarea data-field="description" data-id="${id}" rows="2" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">${escapeHtml(item.description || "")}</textarea>
                </div>
                <div>
                  <label class="mb-1 block text-xs font-medium text-slate-600">Imagen (URL)</label>
                  <input data-field="url" data-id="${id}" value="${escapeHtml(item.url)}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
                </div>
                <div>
                  <label class="mb-1 block text-xs font-medium text-slate-600">O subir nueva imagen</label>
                  <input data-field="image-file" data-id="${id}" type="file" accept="image/*" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm file:mr-4 file:rounded-lg file:border-0 file:bg-emerald-100 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-emerald-700" />
                </div>
                <div class="flex gap-2">
                  <button data-save-store="${id}" data-source="${source}" class="rounded-lg bg-emerald-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-800">Guardar cambios</button>
                  <button data-cancel-edit="${id}" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">Cancelar</button>
                </div>
              </div>
            </div>
          `;
        }).join("");
      }

      function bindAdminEvents() {
        document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));
        document.getElementById("save-config").addEventListener("click", saveConfig);
        document.getElementById("upload-promo").addEventListener("click", uploadPromoFiles);
        document.getElementById("add-promo-url").addEventListener("click", addPromoUrl);
        document.getElementById("upload-gallery").addEventListener("click", uploadGalleryFiles);
        document.getElementById("add-gallery-url").addEventListener("click", addGalleryUrl);
        document.getElementById("upload-hero").addEventListener("click", uploadHeroFiles);
        document.getElementById("add-hero-url").addEventListener("click", addHeroUrl);
        document.getElementById("upload-store").addEventListener("click", uploadStoreFiles);
        document.getElementById("add-store-url").addEventListener("click", addStoreUrl);
        document.getElementById("upload-facebook-video").addEventListener("click", uploadFacebookVideo);

        document.querySelectorAll(".admin-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            const target = tab.dataset.tab;
            document.querySelectorAll(".admin-tab").forEach((t) => {
              t.classList.remove("border-emerald-600", "text-emerald-700");
              t.classList.add("border-transparent", "text-slate-600");
            });

      function isValidUrl(string) {
        try {
          new URL(string);

        } catch {

        }

      function buildPromoItemFromUrl(url) {
        const youtubeRegex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/;
        const match = url.match(youtubeRegex);
        if (match) {
          return {
            url: `https://www.youtube.com/embed/${match[1]}`,
            name: `YouTube video (${match[1]})`,
            type: "video/youtube",
            poster: `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg`,
            originalUrl: url
          };
        }
        const extension = url.split(".").pop().toLowerCase().split("?")[0];
        const videoTypes = ["mp4", "webm", "ogg", "mov"];
        const imageTypes = ["jpg", "jpeg", "png", "gif", "webp", "svg"];
        const type = videoTypes.includes(extension) ? "video/mp4" : imageTypes.includes(extension) ? "image" : "image";
        return { url, name: url.split("/").pop() || "Promoción", type };
      }

      async function prepareMediaUpload(file, index, kind) {
        const isVideo = file.type?.startsWith("video");
        const item = {
          name: file.name,
          type: isVideo ? "video" : "image",
          position: Date.now() + index
        };
        if (isVideo) {
          item.poster = await createVideoPoster(file).catch(() => "");
        }
        const base64 = await readFileAsDataURL(file);
        if (typeof base64 !== "string" || !base64.startsWith("data:")) {
          throw new Error("El archivo no se convirtió correctamente.");
        }
        item.url = base64;
        item.size = base64.length;
        return item;
      }

      function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function createVideoPoster(file) {
        return new Promise((resolve) => {
          const objectUrl = URL.createObjectURL(file);
          const video = document.createElement("video");
          video.crossOrigin = "anonymous";
          video.muted = true;
          video.volume = 0;
          video.playsInline = true;
          video.preload = "auto";
          video.src = objectUrl;

          const cleanup = () => {
            try { URL.revokeObjectURL(objectUrl); } catch (e) {}
          };

          const captureFrame = (times) => {
            const time = times.shift();
            if (time === undefined) {
              cleanup();
              resolve("");
              return;
            }
            const onSeeked = () => {
              try {
                const w = video.videoWidth || 480;
                const h = video.videoHeight || 270;
                const scale = Math.min(1, 480 / Math.max(w, h));
                const canvas = document.createElement("canvas");
                canvas.width = Math.max(1, Math.round(w * scale));
                canvas.height = Math.max(1, Math.round(h * scale));
                const ctx = canvas.getContext("2d");
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let sum = 0;
                for (let i = 0; i < data.length; i += 16) {
                  sum += data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
                }
                if (sum / Math.max(1, data.length / 16) < 18) {
                  captureFrame(times);
                  return;
                }
                cleanup();
                resolve(canvas.toDataURL("image/jpeg", 0.8));
              } catch (error) {
                cleanup();
                resolve("");
              }
            };
            video.addEventListener("seeked", onSeeked, { once: true });
            try {
              video.currentTime = time;
            } catch (error) {
              video.removeEventListener("seeked", onSeeked);
              captureFrame(times);
            }
          };

          video.addEventListener("loadeddata", () => {
            const duration = Math.max(video.duration || 1, 1);
            captureFrame([
              Math.min(0.5, duration - 0.1),
              Math.min(1, duration - 0.1),
              Math.min(2, duration - 0.1),
              Math.min(3, duration - 0.1)
            ]);
          }, { once: true });
          video.addEventListener("error", () => {
            cleanup();
            resolve("");
          }, { once: true });
        });
      }

      function showMessage(message, type) {
        const box = document.getElementById("admin-message");
        if (!box) return;
        box.className = `rounded-xl px-4 py-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"}`;
        box.textContent = message;
        box.classList.remove("hidden");
      }

      function escapeHtml(text) {
        if (!text) return "";
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
