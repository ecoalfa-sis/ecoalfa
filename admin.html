    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div id="app" class="min-h-screen"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBs85ZtM0tUI5XYypWTze-8xfPJj3EaV5g",
        authDomain: "ecoalfa-6f9d1.firebaseapp.com",
        projectId: "ecoalfa-6f9d1",
        storageBucket: "ecoalfa-6f9d1.firebasestorage.app",
        messagingSenderId: "760816764581",
        appId: "1:760816764581:web:31ef204b23ca5980852f4c",
        measurementId: "G-77WWNZFNY6"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const appContainer = document.getElementById("app");
      let currentUser = null;
      let currentUserProfile = null;
      let currentConfig = null;
      let pendingPromoFiles = [];

      const DEFAULT_CONFIG = {
        companyName: "Ecoalfa",
        slogan: "su salud es lo más importante",
        phone: "322 897 1484",
        whatsappNumber: "573228971484",
        email: "",
        address: "Colombia",
        timezone: "Bogotá",
        heroTitle: "Tu salud en las mejores manos",
        heroHighlight: "mejores manos",
        heroDescription: "En Ecoalfa te acompañamos con una atención cercana, clara y personalizada. Agenda tu cita, resuelve tus dudas y recibe orientación pensada para tu bienestar.",
        primaryButtonText: "Agendar por WhatsApp",
        secondaryButtonText: "Ingresar al portal",
        ctaTitle: "Da el primer paso hacia tu bienestar",
        ctaDescription: "Estamos en Colombia y trabajamos con hora Bogotá para que tus citas, recordatorios y atención médica estén siempre alineados correctamente.",
        showPromoModal: true,
        promoAutoPlay: true,
        promoInterval: 5000,
        promoItems: [],
        plansSectionTitle: "Nuestros planes",
        plansSectionDescription: "Elige el plan que se ajuste a tus necesidades y comienza a cuidar tu salud.",
        plansButtonText: "Afiliarme",
        plansWhatsAppNumber: "573228971484",
        plansWhatsAppMessage: "Hola, quiero conocer más sobre el plan",
        plans: [
          {
            id: "gold",
            name: "Plan Gold",
            price: "$99.000/mes",
            description: "Ideal para consultas básicas y acompañamiento mensual.",
            features: ["1 consulta médica al mes", "Chat de soporte", "Recordatorios de medicación"]
          },
          {
            id: "premium",
            name: "Plan Premium",
            price: "$199.000/mes",
            description: "Atención más completa para ti y tu familia.",
            features: ["3 consultas médicas al mes", "Chat de soporte prioritario", "Recordatorios de medicación", "Historial clínico digital"]
          },
          {
            id: "platinum",
            name: "Plan Platinum",
            price: "$349.000/mes",
            description: "Cobertura integral con beneficios exclusivos.",
            features: ["Consultas médicas ilimitadas", "Soporte 24/7", "Recordatorios de medicación", "Historial clínico digital", "Descuentos en medicamentos"]
          }
        ]
      };

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          renderLogin();
          return;
        }
        currentUser = user;
        try {
          const profileSnap = await getDoc(doc(db, "users", user.uid));
          currentUserProfile = profileSnap.exists() ? profileSnap.data() : null;
          if (!isAuthorized(currentUserProfile)) {
            await signOut(auth);
            renderLogin("No tienes permisos para acceder a esta sección.");
            return;
          }
          await loadConfig();
          renderAdmin();
        } catch (error) {
          console.error("Error verificando usuario", error);
          renderLogin("No fue posible verificar tu perfil. Intenta de nuevo.");
        }
      });

      function isAuthorized(profile) {
        if (!profile) return false;
        return profile.active === true && (profile.role === "admin" || profile.role === "medico");
      }

      function renderLogin(errorMessage = "") {
        appContainer.innerHTML = `
          <main class="grid min-h-screen place-items-center p-6">
            <div class="w-full max-w-md rounded-3xl bg-white p-8 shadow-lg ring-1 ring-slate-200">
              <div class="mb-6 text-center">
                <h1 class="text-2xl font-bold text-slate-900">Administración Ecoalfa</h1>
                <p class="mt-2 text-sm text-slate-500">Solo administradores y médicos pueden ingresar.</p>
              </div>
              <form id="login-form" class="space-y-4">
                <div>
                  <label class="mb-1 block text-sm font-medium text-slate-700">Correo electrónico</label>
                  <input id="login-email" type="email" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                </div>
                <div>
                  <label class="mb-1 block text-sm font-medium text-slate-700">Contraseña</label>
                  <input id="login-password" type="password" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                </div>
                ${errorMessage ? `<p class="rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700">${errorMessage}</p>` : ""}
                <button type="submit" class="w-full rounded-xl bg-emerald-700 px-4 py-3 font-semibold text-white transition hover:bg-emerald-800">Ingresar</button>
              </form>
            </div>
          </main>
        `;

        document.getElementById("login-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;
          try {
            await signInWithEmailAndPassword(auth, email, password);
          } catch (error) {
            const messages = {
              "auth/invalid-email": "Correo inválido.",
              "auth/user-not-found": "Usuario no encontrado.",
              "auth/wrong-password": "Contraseña incorrecta.",
              "auth/invalid-credential": "Credenciales incorrectas.",
              "auth/user-disabled": "Usuario deshabilitado."
            };
            renderLogin(messages[error.code] || "Error al iniciar sesión.");
          }
        });
      }

      async function loadConfig() {
        const configRef = doc(db, "config", "siteConfig");
        const snapshot = await getDoc(configRef);
        currentConfig = snapshot.exists() ? { ...DEFAULT_CONFIG, ...snapshot.data() } : { ...DEFAULT_CONFIG };
      }

      async function saveConfig() {
        const payload = {
          companyName: document.getElementById("cfg-companyName").value.trim(),
          slogan: document.getElementById("cfg-slogan").value.trim(),
          phone: document.getElementById("cfg-phone").value.trim(),
          whatsappNumber: document.getElementById("cfg-whatsappNumber").value.trim(),
          email: document.getElementById("cfg-email").value.trim(),
          address: document.getElementById("cfg-address").value.trim(),
          timezone: document.getElementById("cfg-timezone").value.trim(),
          heroTitle: document.getElementById("cfg-heroTitle").value.trim(),
          heroHighlight: document.getElementById("cfg-heroHighlight").value.trim(),
          heroDescription: document.getElementById("cfg-heroDescription").value.trim(),
          primaryButtonText: document.getElementById("cfg-primaryButtonText").value.trim(),
          secondaryButtonText: document.getElementById("cfg-secondaryButtonText").value.trim(),
          ctaTitle: document.getElementById("cfg-ctaTitle").value.trim(),
          ctaDescription: document.getElementById("cfg-ctaDescription").value.trim(),
          showPromoModal: document.getElementById("cfg-showPromoModal").checked,
          promoAutoPlay: document.getElementById("cfg-promoAutoPlay").checked,
          promoInterval: Number(document.getElementById("cfg-promoInterval").value) || 5000,
          promoItems: currentConfig.promoItems || [],
          plansSectionTitle: document.getElementById("cfg-plansSectionTitle").value.trim(),
          plansSectionDescription: document.getElementById("cfg-plansSectionDescription").value.trim(),
          plansButtonText: document.getElementById("cfg-plansButtonText").value.trim(),
          plansWhatsAppNumber: document.getElementById("cfg-plansWhatsAppNumber").value.trim(),
          plansWhatsAppMessage: document.getElementById("cfg-plansWhatsAppMessage").value.trim(),
          plans: readPlansConfig()
        };

        const configRef = doc(db, "config", "siteConfig");
        await setDoc(configRef, {
          ...payload,
          updatedAt: serverTimestamp(),
          updatedBy: {
            uid: currentUser?.uid || "",
            name: currentUserProfile?.displayName || currentUser?.email || ""
          }
        }, { merge: true });

        currentConfig = payload;
        showMessage("Configuración guardada correctamente.", "success");
      }

      function renderPlansConfig(plans) {
        return (plans || []).map((plan, index) => `
          <div class="rounded-xl border border-slate-200 p-4">
            <p class="mb-3 text-sm font-semibold text-slate-700">Plan ${index + 1}</p>
            <div class="space-y-3">
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Nombre del plan</label>
                <input id="cfg-plan-${index}-name" value="${escapeHtml(plan.name || "")}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Precio</label>
                <input id="cfg-plan-${index}-price" value="${escapeHtml(plan.price || "")}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Descripción</label>
                <input id="cfg-plan-${index}-description" value="${escapeHtml(plan.description || "")}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100" />
              </div>
              <div>
                <label class="mb-1 block text-xs font-medium text-slate-600">Beneficios (uno por línea)</label>
                <textarea id="cfg-plan-${index}-features" rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">${escapeHtml((plan.features || []).join("\n"))}</textarea>
              </div>
            </div>
          </div>
        `).join("");
      }

      function readPlansConfig() {
        const plans = [];
        for (let i = 0; i < 3; i++) {
          const name = document.getElementById(`cfg-plan-${i}-name`)?.value.trim() || "";
          const price = document.getElementById(`cfg-plan-${i}-price`)?.value.trim() || "";
          const description = document.getElementById(`cfg-plan-${i}-description`)?.value.trim() || "";
          const features = document.getElementById(`cfg-plan-${i}-features`)?.value.split("\n").map((f) => f.trim()).filter(Boolean) || [];
          plans.push({ id: currentConfig?.plans?.[i]?.id || `plan-${i + 1}`, name, price, description, features });
        }
        return plans;
      }

                        <input id="cfg-companyName" value="${escapeHtml(cfg.companyName)}" class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />

                      </div>
                      <div>

                      </div>
                    </div>
                  </div>

                  <div class="rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
                    <h2 class="text-lg font-bold text-slate-900">Contenido principal</h2>
                    <div class="mt-5 space-y-4">

                        <input id="cfg-heroTitle" value="${escapeHtml(cfg.heroTitle)}" class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />
                      </div>
                      <div>
                        <label class="mb-1 block text-sm font-medium text-slate-700">Texto resaltado del hero</label>
                        <input id="cfg-heroHighlight" value="${escapeHtml(cfg.heroHighlight)}" class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100" />

                      <div>

                          Imágenes y videos se comprimen automáticamente. Se guardan en Firestore como base64 sin fecha de expiración. Firestore permite máximo 1 MB por documento, por eso los videos se comprimen a baja resolución.
                        </div>
                        <div class="mt-2">
                          <input id="promo-files" type="file" accept="image/*,video/*" multiple class="w-full rounded-xl border border-slate-300 px-4 py-2 text-sm file:mr-4 file:rounded-lg file:border-0 file:bg-emerald-100 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-emerald-700" />
                        </div>
                        <button id="upload-promo" class="mt-2 w-full rounded-xl bg-emerald-700 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-800">Subir archivos</button>
                      </div>

                      <div id="promo-list" class="space-y-3">
                        ${renderPromoItems(cfg.promoItems)}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        `;

        bindAdminEvents();
      }

      function renderPromoItems(items) {
        if (!items || items.length === 0) {
          return `<p class="text-sm text-slate-500">No hay promociones agregadas.</p>`;
        }
        return items.map((item, index) => {
          let thumbnail = "";
          if (item.type === "video/youtube") {
            thumbnail = `<div class="flex h-16 w-16 items-center justify-center rounded-lg bg-red-100 text-red-600 font-bold text-xs">YouTube</div>`;
          } else if (item.type?.startsWith("video")) {
            thumbnail = `<video src="${item.url}" class="h-16 w-16 rounded-lg object-cover"></video>`;
          } else {
            thumbnail = `<img src="${item.url}" alt="" class="h-16 w-16 rounded-lg object-cover" />`;
          }
          return `
            <div class="flex items-center gap-3 rounded-xl border border-slate-200 p-3">
              ${thumbnail}
              <div class="min-w-0 flex-1">
                <p class="truncate text-sm font-medium text-slate-900">${item.name}</p>
                <p class="text-xs text-slate-500">${item.type || "imagen"}</p>
              </div>
              <button data-remove-promo="${index}" class="rounded-lg px-2 py-1 text-sm font-medium text-red-600 hover:bg-red-50">Quitar</button>
            </div>
          `;
        }).join("");
      }

      function bindAdminEvents() {
        document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));
        document.getElementById("save-config").addEventListener("click", saveConfig);
        document.getElementById("upload-promo").addEventListener("click", uploadPromoFiles);
        document.getElementById("add-promo-url").addEventListener("click", addPromoUrl);

        document.querySelectorAll("[data-remove-promo]").forEach((button) => {
          button.addEventListener("click", async () => {
            const index = Number(button.dataset.removePromo);
            currentConfig.promoItems.splice(index, 1);
            document.getElementById("promo-list").innerHTML = renderPromoItems(currentConfig.promoItems);
            bindAdminEvents();
            await saveConfig();
          });
        });

        document.getElementById("promo-files").addEventListener("change", (event) => {
          pendingPromoFiles = Array.from(event.target.files);
        });
      }

      async function addPromoUrl() {
        const input = document.getElementById("promo-url");
        const url = input.value.trim();

        if (!url) {
          showMessage("Ingresa una URL válida.", "error");
          return;
        }

        if (!isValidUrl(url)) {
          showMessage("La URL no es válida.", "error");
          return;
        }

        const item = buildPromoItemFromUrl(url);
        currentConfig.promoItems = [...(currentConfig.promoItems || []), item];
        document.getElementById("promo-list").innerHTML = renderPromoItems(currentConfig.promoItems);
        input.value = "";
        bindAdminEvents();
        await saveConfig();
        showMessage("URL agregada correctamente.", "success");
      }

      function isValidUrl(string) {
        try {
          new URL(string);
          return true;
        } catch {
          return false;
        }
      }

      function buildPromoItemFromUrl(url) {
        const youtubeRegex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/;
        const match = url.match(youtubeRegex);
        if (match) {
          return {
            url: `https://www.youtube.com/embed/${match[1]}`,
            name: `YouTube video (${match[1]})`,
            type: "video/youtube",
            originalUrl: url
          };
        }
        const extension = url.split(".").pop().toLowerCase().split("?")[0];
        const videoTypes = ["mp4", "webm", "ogg", "mov"];
        const imageTypes = ["jpg", "jpeg", "png", "gif", "webp", "svg"];
        const type = videoTypes.includes(extension) ? "video/mp4" : imageTypes.includes(extension) ? "image" : "image";
        return { url, name: url.split("/").pop() || "Promoción", type };
      }

      async function uploadPromoFiles() {
        if (!pendingPromoFiles.length) {
          showMessage("Selecciona al menos un archivo.", "error");
          return;
        }

        const oversized = pendingPromoFiles.filter((file) => {
          if (file.type?.startsWith("video")) {
            return file.size > 50 * 1024 * 1024;
          }
          return file.size > 10 * 1024 * 1024;
        });
        if (oversized.length > 0) {
          showMessage("Algunos archivos son muy grandes: imágenes máx 10 MB, videos máx 50 MB. El sistema intentará comprimirlos.", "error");
          return;
        }

        const button = document.getElementById("upload-promo");
        button.disabled = true;
        button.textContent = "Comprimiendo...";

        try {
          const uploads = await Promise.all(
            pendingPromoFiles.map(async (file) => {
              const base64 = await processFile(file);
              const isVideo = file.type?.startsWith("video");
              return {
                url: base64,
                name: file.name,
                type: isVideo ? "video" : "image",
                size: base64.length
              };
            })
          );

          currentConfig.promoItems = [...(currentConfig.promoItems || []), ...uploads];
          document.getElementById("promo-list").innerHTML = renderPromoItems(currentConfig.promoItems);
          document.getElementById("promo-files").value = "";
          pendingPromoFiles = [];
          bindAdminEvents();
          await saveConfig();
          showMessage("Archivos guardados correctamente.", "success");
        } catch (error) {
          console.error("Error procesando archivos", error);
          showMessage("No fue posible procesar los archivos. Intenta con archivos más pequeños o con formato diferente.", "error");
        } finally {
          button.disabled = false;
          button.textContent = "Subir archivos";
        }
      }

      async function processFile(file) {
        if (file.type?.startsWith("video")) {
          return await compressVideo(file, 0.75); // target 0.75 MB para que base64 quepa en Firestore (1 MB)
        }
        return await compressImage(file, 1200, 0.7);
      }

      function compressImage(file, maxSize, quality) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement("canvas");
              let w = img.width;
              let h = img.height;
              if (w > maxSize || h > maxSize) {
                if (w > h) {
                  h = Math.round(h * maxSize / w);
                  w = maxSize;
                } else {
                  w = Math.round(w * maxSize / h);
                  h = maxSize;
                }
              }
              canvas.width = w;
              canvas.height = h;
              const ctx = canvas.getContext("2d");
              ctx.fillStyle = "#FFFFFF";
              ctx.fillRect(0, 0, w, h);
              ctx.drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL("image/jpeg", quality));
            };
            img.onerror = reject;
            img.src = e.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function compressVideo(file, maxSizeMB) {
        return new Promise((resolve, reject) => {
          const MAX_BYTES = (maxSizeMB || 0.75) * 1024 * 1024;
          // Si el video ya es pequeño, enviarlo directo como base64
          if (file.size <= MAX_BYTES) {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
            return;
          }

          const video = document.createElement("video");
          video.muted = true;
          video.playsInline = true;
          video.src = URL.createObjectURL(file);

          video.onloadedmetadata = () => {
            const duration = video.duration;
            let w = video.videoWidth;
            let h = video.videoHeight;
            const maxDim = 360; // resolución baja para caber en 1 MB
            if (w > maxDim || h > maxDim) {
              if (w > h) {
                h = Math.round(h * maxDim / w);
                w = maxDim;
              } else {
                w = Math.round(w * maxDim / h);
                h = maxDim;
              }
            }

            const canvas = document.createElement("canvas");
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");

            const targetBits = MAX_BYTES * 8 * 0.85; // 85% del máximo
            const videoBitrate = Math.min(500000, Math.floor(targetBits / Math.max(duration, 1)));

            let videoStream;
            try {
              videoStream = canvas.captureStream(24);
            } catch (e) {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.onerror = reject;
              reader.readAsDataURL(file);
              return;
            }

            // Agregar pista de audio al stream para que el video comprimido tenga sonido
            let audioContext = null;
            let audioDestination = null;
            let audioSource = null;
            try {
              audioContext = new (window.AudioContext || window.webkitAudioContext)();
              audioDestination = audioContext.createMediaStreamDestination();
              audioSource = audioContext.createMediaElementSource(video);
              audioSource.connect(audioDestination);
              audioSource.connect(audioContext.destination);
              videoStream.addTrack(audioDestination.stream.getAudioTracks()[0]);
            } catch (audioErr) {
              console.warn("No se pudo agregar audio al video comprimido:", audioErr);
            }

            const mimeType = MediaRecorder.isTypeSupported("video/webm;codecs=vp9") ? "video/webm;codecs=vp9" : MediaRecorder.isTypeSupported("video/webm;codecs=vp8") ? "video/webm;codecs=vp8" : "video/webm";
            const audioBitrate = 64000; // 64 kbps de audio
            const recorder = new MediaRecorder(videoStream, { mimeType, videoBitsPerSecond: videoBitrate, audioBitsPerSecond: audioBitrate });
            const chunks = [];

            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = () => {
              const blob = new Blob(chunks, { type: mimeType });
              const reader = new FileReader();
              reader.onload = () => {
                URL.revokeObjectURL(video.src);
                if (audioContext && audioContext.state !== "closed") {
                  try { audioContext.close(); } catch (e) {}
                }
                resolve(reader.result);
              };
              reader.onerror = reject;
              reader.readAsDataURL(blob);
            };
            recorder.onerror = (e) => reject(e);

            recorder.start(100);
            video.currentTime = 0;
            video.play();

            const drawFrame = () => {
              if (video.ended || video.paused) {
                if (recorder.state === "recording") recorder.stop();
                videoStream.getTracks().forEach((t) => t.stop());
                return;
              }
              ctx.drawImage(video, 0, 0, w, h);
              requestAnimationFrame(drawFrame);
            };

            video.onplay = () => drawFrame();
            video.onended = () => {
              setTimeout(() => {
                if (recorder.state === "recording") recorder.stop();
                videoStream.getTracks().forEach((t) => t.stop());
                if (audioContext && audioContext.state !== "closed") {
                  try { audioContext.close(); } catch (e) {}
                }
              }, 200);
            };
            video.onerror = () => reject(new Error("Error al reproducir video"));
          };
          video.onerror = () => reject(new Error("Error al cargar video"));
        });
      }

      function showMessage(message, type) {
        const box = document.getElementById("admin-message");
        if (!box) return;
        box.className = `rounded-xl px-4 py-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"}`;
        box.textContent = message;
        box.classList.remove("hidden");
      }

      function escapeHtml(text) {
        if (!text) return "";
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    </script>
  </body>
</html>
