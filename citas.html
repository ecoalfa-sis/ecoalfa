<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de pacientes | Ecoalfa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body class="bg-slate-100 text-slate-900">
    <div id="patient-app"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        createUserWithEmailAndPassword,
        getAuth,
        onAuthStateChanged,
        signInWithEmailAndPassword,
        signOut
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
      import {
        addDoc,
        collection,
        doc,
        getDoc,
        getDocs,
        limit,
        orderBy,
        query,
        serverTimestamp,
        setDoc,
        where
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBs85ZtM0tUI5XYypWTze-8xfPJj3EaV5g",
        authDomain: "ecoalfa-6f9d1.firebaseapp.com",
        projectId: "ecoalfa-6f9d1",
        storageBucket: "ecoalfa-6f9d1.firebasestorage.app",
        messagingSenderId: "760816764581",
        appId: "1:760816764581:web:31ef204b23ca5980852f4c",
        measurementId: "G-77WWNZFNY6"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const root = document.querySelector("#patient-app");
      let currentPatient = null;
      let doctors = [];

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          renderAuth();
          return;
        }

        renderLoading();

        try {
          currentPatient = await getPatientByAuthUser(user);
          doctors = await getDoctors();
          renderPortal(user, currentPatient);
          await loadPortalData(user, currentPatient);
        } catch (error) {
          console.error("No fue posible cargar el portal del paciente", error);
          renderAuth("Tu usuario existe, pero aún no tiene perfil de paciente asociado. Completa el registro con el mismo correo.");
        }
      });

      function renderAuth(message = "") {
        root.innerHTML = `
          <main class="mx-auto max-w-6xl p-6">
            <section class="overflow-hidden rounded-3xl bg-white shadow-sm ring-1 ring-slate-200">
              <img src="./assets/ecoalfa-banner.jpg" alt="Ecoalfa" class="h-64 w-full object-cover object-center" />
              <div class="grid gap-8 p-8 lg:grid-cols-[1fr_420px] lg:items-start">
                <div>
                  <img src="./assets/ecoalfa-logo.jpg" alt="Logo Ecoalfa" class="mb-6 h-32 w-32 rounded-2xl object-contain ring-1 ring-slate-200" />
                  <h1 class="text-4xl font-bold text-slate-950">Portal de pacientes Ecoalfa</h1>
                  <p class="mt-3 text-lg text-slate-500">Ingresa como paciente para consultar tus datos, citas, facturas, medicamentos comprados e historia clínica registrada en el consultorio.</p>
                  <div class="mt-6 grid gap-4 sm:grid-cols-3">
                    <div class="rounded-2xl bg-emerald-50 p-4 text-emerald-900"><strong>Mis citas</strong><p class="text-sm">Consulta y solicita agenda.</p></div>
                    <div class="rounded-2xl bg-sky-50 p-4 text-sky-900"><strong>Mi historia</strong><p class="text-sm">Resumen clínico disponible.</p></div>
                    <div class="rounded-2xl bg-lime-50 p-4 text-lime-900"><strong>Mis compras</strong><p class="text-sm">Facturas y medicamentos.</p></div>
                  </div>
                </div>

                <div class="rounded-3xl bg-slate-50 p-6">
                  <div class="mb-5 grid grid-cols-2 gap-2 rounded-2xl bg-white p-1">
                    <button id="show-login" class="rounded-xl bg-emerald-700 px-4 py-2 text-sm font-semibold text-white" type="button">Ingresar</button>
                    <button id="show-register" class="rounded-xl px-4 py-2 text-sm font-semibold text-slate-600" type="button">Registrarme</button>
                  </div>
                  ${message ? `<p class="mb-4 rounded-xl bg-amber-50 px-4 py-3 text-sm text-amber-800">${message}</p>` : ""}
                  <div id="auth-panel"></div>
                </div>
              </div>
            </section>
          </main>
        `;

        bindAuthTabs();
        renderLoginForm();
      }

      function renderLoginForm() {
        document.querySelector("#auth-panel").innerHTML = `
          <form id="login-form" class="space-y-4">
            <label class="block text-sm font-medium">Correo electrónico<input id="login-email" type="email" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
            <label class="block text-sm font-medium">Contraseña<input id="login-password" type="password" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
            <p id="auth-message" class="hidden rounded-xl px-4 py-3 text-sm"></p>
            <button class="w-full rounded-xl bg-emerald-700 px-4 py-3 font-semibold text-white" type="submit">Entrar a mi portal</button>
          </form>
        `;

        document.querySelector("#login-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          try {
            await signInWithEmailAndPassword(auth, event.currentTarget["login-email"].value.trim(), event.currentTarget["login-password"].value);
          } catch (error) {
            console.error("Login paciente falló", error);
            showAuthMessage("No fue posible ingresar. Verifica correo y contraseña.", "error");
          }
        });
      }

      function renderRegisterForm() {
        document.querySelector("#auth-panel").innerHTML = `
          <form id="register-form" class="space-y-5">
            <div class="grid gap-4 sm:grid-cols-2">
              ${selectField("documentType", "Tipo documento", ["CC", "TI", "CE", "Pasaporte", "PEP", "NIT"])}
              ${inputField("documentNumber", "Número de documento", "text", true)}
              ${inputField("firstName", "Primer nombre", "text", true)}
              ${inputField("middleName", "Segundo nombre", "text", false)}
              ${inputField("firstLastName", "Primer apellido", "text", true)}
              ${inputField("secondLastName", "Segundo apellido", "text", false)}
              ${inputField("email", "Correo electrónico", "email", true)}
              ${inputField("phone", "Celular", "tel", true)}
              ${inputField("password", "Contraseña", "password", true)}
              ${selectField("gender", "Género", ["Hombre", "Mujer", "Otro", "Prefiero no decirlo"])}
              ${inputField("customGender", "Si elegiste otro, escríbelo", "text", false)}
              ${inputField("address", "Dirección", "text", true)}
              ${inputField("neighborhood", "Barrio", "text", true)}
              ${inputField("municipality", "Municipio", "text", true)}
            </div>
            <p id="auth-message" class="hidden rounded-xl px-4 py-3 text-sm"></p>
            <button class="w-full rounded-xl bg-emerald-700 px-4 py-3 font-semibold text-white" type="submit">Crear mi usuario de paciente</button>
          </form>
        `;

        document.querySelector("#register-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          const form = event.currentTarget;

          try {
            const credential = await createUserWithEmailAndPassword(auth, form.email.value.trim(), form.password.value);
            await createPatientProfile(credential.user.uid, form);
          } catch (error) {
            console.error("Registro paciente falló", error);
            showAuthMessage("No fue posible crear el usuario. Revisa si el correo ya existe o si las reglas permiten registro.", "error");
          }
        });
      }

      function bindAuthTabs() {
        document.querySelector("#show-login").addEventListener("click", renderLoginForm);
        document.querySelector("#show-register").addEventListener("click", renderRegisterForm);
      }

      function renderPortal(user, patient) {
        root.innerHTML = `
          <div class="min-h-screen">
            <header class="bg-slate-950 text-white">
              <div class="mx-auto flex max-w-7xl flex-col justify-between gap-4 px-6 py-5 lg:flex-row lg:items-center">
                <div class="flex items-center gap-4">
                  <img src="./assets/ecoalfa-logo.jpg" alt="Logo Ecoalfa" class="h-16 w-16 rounded-xl bg-white object-contain" />
                  <div>
                    <h1 class="text-2xl font-bold">Portal de pacientes</h1>
                    <p class="text-sm text-emerald-200">${patient?.fullName || user.email}</p>
                  </div>
                </div>
                <div class="flex gap-3">
                  <a href="./index.html" class="rounded-xl bg-white/10 px-4 py-2 text-sm font-semibold hover:bg-white/20">Funcionarios</a>
                  <button id="logout" class="rounded-xl bg-emerald-600 px-4 py-2 text-sm font-semibold hover:bg-emerald-700">Salir</button>
                </div>
              </div>
            </header>

            <main class="mx-auto max-w-7xl space-y-6 p-6">
              <section class="grid gap-4 md:grid-cols-4">
                ${summaryCard("Documento", `${patient?.documentType || ""} ${patient?.documentNumber || ""}`)}
                ${summaryCard("Celular", patient?.phone || "Sin celular")}
                ${summaryCard("Correo", patient?.email || user.email)}
                ${summaryCard("Municipio", patient?.municipality || "Sin municipio")}
              </section>

              <section class="grid gap-6 xl:grid-cols-[420px_1fr]">
                <div class="space-y-6">
                  <form id="appointment-form" class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
                    <h2 class="text-xl font-bold">Solicitar nueva cita</h2>
                    <div class="mt-4 space-y-4">
                      <div>
                        <label class="mb-1 block text-sm font-medium">Médico</label>
                        <select id="doctorId" class="w-full rounded-xl border border-slate-300 px-4 py-3"><option value="">Sin preferencia</option>${doctors.map((doctor) => `<option value="${doctor.id}">${doctor.fullName} · ${doctor.specialty || "Medicina"}</option>`).join("")}</select>
                      </div>
                      ${inputField("requestedDate", "Fecha deseada", "date", true)}
                      ${inputField("requestedTime", "Hora deseada", "time", true)}
                      <label class="block text-sm font-medium">Motivo<textarea id="reason" rows="4" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3"></textarea></label>
                      <p id="portal-message" class="hidden rounded-xl px-4 py-3 text-sm"></p>
                      <button class="w-full rounded-xl bg-emerald-700 px-4 py-3 font-semibold text-white" type="submit">Enviar solicitud</button>
                    </div>
                  </form>

                  <section class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
                    <h2 class="text-xl font-bold">Mis datos</h2>
                    <dl class="mt-4 space-y-3 text-sm" id="patient-profile"></dl>
                  </section>
                </div>

                <div class="space-y-6">
                  ${panel("appointments-panel", "Mis citas")}
                  ${panel("invoices-panel", "Mis facturas y medicamentos")}
                  ${panel("records-panel", "Mi historia clínica")}
                </div>
              </section>
            </main>
          </div>
        `;

        document.querySelector("#logout").addEventListener("click", signOut.bind(null, auth));
        document.querySelector("#appointment-form").addEventListener("submit", async (event) => {
          event.preventDefault();
          await requestAppointment(user, patient, event.currentTarget);
        });
        renderPatientProfile(patient);
      }

      async function loadPortalData(user, patient) {
        const [appointments, invoices, records] = await Promise.all([
          getMyAppointments(patient),
          getMyInvoices(patient),
          getMyClinicalRecords(patient)
        ]);

        document.querySelector("#appointments-panel-content").innerHTML = renderAppointments(appointments);
        document.querySelector("#invoices-panel-content").innerHTML = renderInvoices(invoices);
        document.querySelector("#records-panel-content").innerHTML = renderRecords(records);
      }

      async function createPatientProfile(uid, form) {
        const fullName = [form.firstName.value, form.middleName.value, form.firstLastName.value, form.secondLastName.value].filter(Boolean).join(" ");
        await setDoc(doc(db, "patients", uid), {
          authUid: uid,
          documentType: form.documentType.value,
          documentNumber: form.documentNumber.value.trim(),
          firstName: form.firstName.value.trim(),
          middleName: form.middleName.value.trim(),
          firstLastName: form.firstLastName.value.trim(),
          secondLastName: form.secondLastName.value.trim(),
          fullName,
          email: form.email.value.trim().toLowerCase(),
          phone: form.phone.value.trim(),
          address: form.address.value.trim(),
          neighborhood: form.neighborhood.value.trim(),
          municipality: form.municipality.value.trim(),
          gender: form.gender.value,
          customGender: form.customGender.value.trim(),
          source: "patient_portal",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        }, { merge: true });
      }

      async function getPatientByAuthUser(user) {
        const patientSnap = await getDoc(doc(db, "patients", user.uid));
        if (patientSnap.exists()) return { id: patientSnap.id, ...patientSnap.data() };
        throw new Error("patient-profile-not-found");
      }

      async function getDoctors() {
        const snapshot = await getDocs(query(collection(db, "doctors"), orderBy("fullName"), limit(50)));
        return snapshot.docs.map((doctor) => ({ id: doctor.id, ...doctor.data() })).filter((doctor) => doctor.active !== false);
      }

      async function requestAppointment(user, patient, form) {
        const selectedDoctor = doctors.find((doctor) => doctor.id === form.doctorId.value);
        try {
          await addDoc(collection(db, "publicAppointmentRequests"), {
            patientId: patient.id,
            authUid: user.uid,
            documentType: patient.documentType,
            documentNumber: patient.documentNumber,
            fullName: patient.fullName,
            email: patient.email,
            phone: patient.phone,
            doctorId: form.doctorId.value,
            doctorName: selectedDoctor?.fullName || "Sin preferencia",
            requestedDate: form.requestedDate.value,
            requestedTime: form.requestedTime.value,
            reason: form.reason.value.trim(),
            status: "Solicitada",
            source: "patient_portal",
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          form.reset();
          showPortalMessage("Solicitud enviada. El consultorio confirmará tu cita.", "success");
        } catch (error) {
          console.error("No se pudo solicitar cita", error);
          showPortalMessage("No fue posible solicitar la cita.", "error");
        }
      }

      async function getMyAppointments(patient) {
        const snapshot = await getDocs(query(collection(db, "appointments"), where("documentNumber", "==", patient.documentNumber), limit(20)));
        return snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));
      }

      async function getMyInvoices(patient) {
        const snapshot = await getDocs(query(collection(db, "invoices"), where("patientDocument", "==", patient.documentNumber), limit(20)));
        return snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));
      }

      async function getMyClinicalRecords(patient) {
        const snapshot = await getDocs(query(collection(db, "patients", patient.id, "clinicalRecords"), orderBy("createdAt", "desc"), limit(20)));
        return snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));
      }

      function renderLoading() {
        root.innerHTML = `<main class="grid min-h-screen place-items-center"><div class="rounded-3xl bg-white p-8 shadow-sm">Cargando portal del paciente...</div></main>`;
      }

      function inputField(id, label, type, required) {
        return `<label class="block text-sm font-medium">${label}<input id="${id}" type="${type}" ${required ? "required" : ""} class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>`;
      }

      function selectField(id, label, options) {
        return `<label class="block text-sm font-medium">${label}<select id="${id}" class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3">${options.map((option) => `<option>${option}</option>`).join("")}</select></label>`;
      }

      function summaryCard(label, value) {
        return `<article class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200"><p class="text-xs uppercase text-slate-400">${label}</p><strong class="mt-1 block text-slate-900">${value || "Sin dato"}</strong></article>`;
      }

      function panel(id, title) {
        return `<section class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200"><h2 class="text-xl font-bold">${title}</h2><div id="${id}-content" class="mt-4 space-y-3 text-sm text-slate-700">Cargando...</div></section>`;
      }

      function renderPatientProfile(patient) {
        document.querySelector("#patient-profile").innerHTML = [
          ["Nombre", patient.fullName],
          ["Documento", `${patient.documentType || ""} ${patient.documentNumber || ""}`],
          ["Correo", patient.email],
          ["Celular", patient.phone],
          ["Dirección", patient.address],
          ["Barrio", patient.neighborhood],
          ["Municipio", patient.municipality],
          ["Género", patient.gender === "Otro" ? patient.customGender : patient.gender],
          ["EPS", patient.eps],
          ["Grupo sanguíneo", patient.bloodType]
        ].map(([label, value]) => `<div class="flex justify-between gap-4 border-b border-slate-100 pb-2"><dt class="text-slate-500">${label}</dt><dd class="font-medium text-slate-900">${value || "Sin dato"}</dd></div>`).join("");
      }

      function renderAppointments(items) {
        if (!items.length) return `<div class="rounded-xl border border-dashed border-slate-300 p-4 text-slate-500">Aún no tienes citas confirmadas.</div>`;
        return items.map((item) => `<article class="rounded-xl border border-slate-200 p-4"><strong>${item.dateKey || item.requestedDate || "Sin fecha"} · ${item.time || item.requestedTime || ""}</strong><p>${item.doctorName || "Sin médico"} · ${item.status || "Programada"}</p><p class="text-slate-500">${item.reason || ""}</p></article>`).join("");
      }

      function renderInvoices(items) {
        if (!items.length) return `<div class="rounded-xl border border-dashed border-slate-300 p-4 text-slate-500">Aún no tienes facturas registradas.</div>`;
        return items.map((invoice) => `<article class="rounded-xl border border-slate-200 p-4"><strong>Factura ${invoice.number}</strong><p>Total: $${Number(invoice.total || 0).toLocaleString("es-CO")} · ${invoice.paymentType || ""}</p><ul class="mt-2 list-disc pl-5">${(invoice.items || []).map((item) => `<li>${item.name} x ${item.quantity}</li>`).join("")}</ul></article>`).join("");
      }

      function renderRecords(items) {
        if (!items.length) return `<div class="rounded-xl border border-dashed border-slate-300 p-4 text-slate-500">Aún no tienes historia clínica registrada.</div>`;
        return items.map((record) => `<article class="rounded-xl border border-slate-200 p-4"><strong>${record.diagnosis || "Consulta médica"}</strong><p class="mt-1 text-slate-500">${record.reason || ""}</p><p class="mt-2"><b>Tratamiento:</b> ${record.prescription || record.treatmentPlan || "Sin tratamiento registrado"}</p></article>`).join("");
      }

      function showAuthMessage(text, type) {
        const box = document.querySelector("#auth-message");
        box.className = `rounded-xl px-4 py-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"}`;
        box.textContent = text;
      }

      function showPortalMessage(text, type) {
        const box = document.querySelector("#portal-message");
        box.className = `rounded-xl px-4 py-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"}`;
        box.textContent = text;
      }
    </script>
  </body>
</html>
