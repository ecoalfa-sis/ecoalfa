      function initHeroCanvas() {
        const canvas = document.querySelector("#hero-canvas");
        if (!canvas) return;

        const context = canvas.getContext("2d");
        const parent = canvas.parentElement;
        const particles = Array.from({ length: 34 }, (_, index) => ({
          x: Math.random(),
          y: Math.random(),
          radius: 1.5 + Math.random() * 4,
          speed: 0.0008 + Math.random() * 0.0018,
          phase: index * 0.7
        }));

        function resize() {
          const rect = parent.getBoundingClientRect();
          canvas.width = Math.max(1, Math.floor(rect.width * window.devicePixelRatio));
          canvas.height = Math.max(1, Math.floor(rect.height * window.devicePixelRatio));
          context.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
        }

        function draw(time) {
          const width = canvas.width / window.devicePixelRatio;
          const height = canvas.height / window.devicePixelRatio;
          const gradient = context.createLinearGradient(0, 0, width, height);
          gradient.addColorStop(0, "#052e2b");
          gradient.addColorStop(0.45, "#064e3b");
          gradient.addColorStop(1, "#0f172a");

          context.clearRect(0, 0, width, height);
          context.fillStyle = gradient;
          context.fillRect(0, 0, width, height);

          context.globalAlpha = 0.2;
          context.fillStyle = "#22c55e";
          context.beginPath();
          context.arc(width * 0.9, height * 0.05, height * 0.7, 0, Math.PI * 2);
          context.fill();

          context.globalAlpha = 0.16;
          context.strokeStyle = "#7dd3fc";
          context.lineWidth = 2;
          for (let i = 0; i < 5; i += 1) {
            context.beginPath();
            context.arc(width * 0.12, height * 0.28, 90 + i * 32, 0, Math.PI * 1.65);
            context.stroke();
          }

          context.globalAlpha = 0.75;
          particles.forEach((particle) => {
            const x = particle.x * width + Math.sin(time * particle.speed + particle.phase) * 24;
            const y = particle.y * height + Math.cos(time * particle.speed + particle.phase) * 18;
            context.fillStyle = particle.radius > 4 ? "#86efac" : "#bae6fd";
            context.beginPath();
            context.arc(x, y, particle.radius, 0, Math.PI * 2);
            context.fill();
          });

          context.globalAlpha = 1;
          requestAnimationFrame(draw);
        }

        resize();
        window.addEventListener("resize", resize);
        requestAnimationFrame(draw);
      }

      async function findPatientByDocument(documentNumber) {
        const q = query(collection(db, "patients"), where("documentNumber", "==", documentNumber.trim()), limit(1));
        const snapshot = await getDocs(q);
        if (snapshot.empty) return null;
        const doc = snapshot.docs[0];
        return { id: doc.id, ...doc.data() };
      }

      async function createPatientProfile(uid, form) {
        const documentNumber = form.documentNumber.value.trim();
        const fullName = [form.firstName.value, form.middleName.value, form.firstLastName.value, form.secondLastName.value].filter(Boolean).join(" ");
        const email = form.email.value.trim().toLowerCase();
        
        const existingPatient = await findPatientByDocument(documentNumber);
        
        if (existingPatient && existingPatient.id !== uid) {
          const confirmLink = confirm(
            `Ya existe un paciente con documento ${documentNumber} en nuestro sistema:\n` +
            `Nombre: ${existingPatient.fullName}\n\n` +
            `¿Deseas vincular tu cuenta de portal con este registro existente?\n\n` +
            `Al vincular:\n` +
            `- Podrás ver tu historial clínico previo\n` +
            `- Tus citas y facturas quedarán centralizadas\n` +
            `- El registro del portal se fusionará con el principal`
          );
          
          if (!confirmLink) {
            throw new Error("user-cancelled-link");
          }
          
          await setDoc(doc(db, "patients", existingPatient.id), {
            authUid: uid,
            email,
            phone: form.phone.value.trim(),
            source: "linked",
            linkedAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          }, { merge: true });
          
          await setDoc(doc(db, "patients", uid), {
            mergedInto: existingPatient.id,
            mergedAt: serverTimestamp()
          });
          
          throw new Error("linked-success");
        }
        
        await setDoc(doc(db, "patients", uid), {
          authUid: uid,
          documentType: form.documentType.value,
          documentNumber,
          firstName: form.firstName.value.trim(),
          middleName: form.middleName.value.trim(),
          firstLastName: form.firstLastName.value.trim(),
          secondLastName: form.secondLastName.value.trim(),
          fullName,
          email,
          phone: form.phone.value.trim(),
          address: form.address.value.trim(),
          neighborhood: form.neighborhood.value.trim(),
          municipality: form.municipality.value.trim(),
          gender: form.gender.value,
          customGender: form.customGender.value.trim(),
          source: "patient_portal",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        }, { merge: true });
      }

      async function getPatientByAuthUser(user) {
        const patientSnap = await getDoc(doc(db, "patients", user.uid));
        if (patientSnap.exists()) {
          const data = patientSnap.data();
          if (data.mergedInto) {
            const mainPatientSnap = await getDoc(doc(db, "patients", data.mergedInto));
            if (mainPatientSnap.exists()) {
              return { id: mainPatientSnap.id, ...mainPatientSnap.data() };
            }
          }
          return { id: patientSnap.id, ...data };
        }
        
        const q = query(collection(db, "patients"), where("authUid", "==", user.uid), limit(1));
        const snapshot = await getDocs(q);
        if (!snapshot.empty) {
          const doc = snapshot.docs[0];
          return { id: doc.id, ...doc.data() };
        }
        
        throw new Error("patient-profile-not-found");
      }

      async function getDoctors() {
        const snapshot = await getDocs(query(collection(db, "doctors"), orderBy("fullName"), limit(50)));
        return snapshot.docs.map((doctor) => ({ id: doctor.id, ...doctor.data() })).filter((doctor) => doctor.active !== false);
      }

      async function requestAppointment(user, patient, form) {
        const selectedDoctor = doctors.find((doctor) => doctor.id === form.doctorId.value);
        try {
          await addDoc(collection(db, "publicAppointmentRequests"), {
            patientId: patient.id,
            authUid: user.uid,
            documentType: patient.documentType,
            documentNumber: patient.documentNumber,
            fullName: patient.fullName,
            email: patient.email,
            phone: patient.phone,
            doctorId: form.doctorId.value,
            doctorName: selectedDoctor?.fullName || "Sin preferencia",
            requestedDate: form.requestedDate.value,
            requestedTime: form.requestedTime.value,
            reason: form.reason.value.trim(),
            status: "Solicitada",
            source: "patient_portal",
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          form.reset();
          showPortalMessage("Solicitud enviada. El consultorio confirmará tu cita.", "success");
        } catch (error) {
          console.error("No se pudo solicitar cita", error);
          showPortalMessage("No fue posible solicitar la cita.", "error");
        }
      }

      async function getMyAppointments(user) {
        const snapshot = await getDocs(query(collection(db, "appointments"), where("authUid", "==", user.uid), limit(20)));
        return snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));
      }

      async function getMyInvoices(user) {
        const snapshot = await getDocs(query(collection(db, "invoices"), where("authUid", "==", user.uid), limit(20)));
        return snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));
      }

      async function getMyClinicalRecords(patient) {
        const snapshot = await getDocs(query(collection(db, "patients", patient.id, "clinicalRecords"), orderBy("createdAt", "desc"), limit(20)));
        return snapshot.docs.map((item) => ({ id: item.id, ...item.data() }));
      }

      function renderLoading() {
        root.innerHTML = `<main class="grid min-h-screen place-items-center"><div class="rounded-3xl bg-white p-8 shadow-sm">Cargando portal del paciente...</div></main>`;
      }

      function inputField(id, label, type, required) {
        return `<label class="block text-sm font-medium">${label}<input id="${id}" type="${type}" ${required ? "required" : ""} class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>`;
      }

      function selectField(id, label, options) {
        return `<label class="block text-sm font-medium">${label}<select id="${id}" class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3">${options.map((option) => `<option>${option}</option>`).join("")}</select></label>`;
      }

      function summaryCard(label, value) {
        return `<article class="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-200"><p class="text-xs uppercase text-slate-400">${label}</p><strong class="mt-1 block text-slate-900">${value || "Sin dato"}</strong></article>`;
      }

      function panel(id, title) {
        return `<section class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200"><h2 class="text-xl font-bold">${title}</h2><div id="${id}-content" class="mt-4 space-y-3 text-sm text-slate-700">Cargando...</div></section>`;
      }

      function renderPatientProfile(patient) {
        document.querySelector("#patient-profile").innerHTML = [
          ["Nombre", patient.fullName],
          ["Documento", `${patient.documentType || ""} ${patient.documentNumber || ""}`],
          ["Correo", patient.email],
          ["Celular", patient.phone],
          ["Dirección", patient.address],
          ["Barrio", patient.neighborhood],
          ["Municipio", patient.municipality],
          ["Género", patient.gender === "Otro" ? patient.customGender : patient.gender],
          ["EPS", patient.eps],
          ["Grupo sanguíneo", patient.bloodType]
        ].map(([label, value]) => `<div class="flex justify-between gap-4 border-b border-slate-100 pb-2"><dt class="text-slate-500">${label}</dt><dd class="font-medium text-slate-900">${value || "Sin dato"}</dd></div>`).join("");
      }

      function renderAppointments(items) {
        if (!items.length) return `<div class="rounded-xl border border-dashed border-slate-300 p-4 text-slate-500">Aún no tienes citas confirmadas.</div>`;
        return items.map((item) => `<article class="rounded-xl border border-slate-200 p-4"><strong>${item.dateKey || item.requestedDate || "Sin fecha"} · ${item.time || item.requestedTime || ""}</strong><p>${item.doctorName || "Sin médico"} · ${item.status || "Programada"}</p><p class="text-slate-500">${item.reason || ""}</p></article>`).join("");
      }

      function renderInvoices(items) {
        if (!items.length) return `<div class="rounded-xl border border-dashed border-slate-300 p-4 text-slate-500">Aún no tienes facturas registradas.</div>`;
        return items.map((invoice) => `<article class="rounded-xl border border-slate-200 p-4"><strong>Factura ${invoice.number}</strong><p>Total: $${Number(invoice.total || 0).toLocaleString("es-CO")} · ${invoice.paymentType || ""}</p><ul class="mt-2 list-disc pl-5">${(invoice.items || []).map((item) => `<li>${item.name} x ${item.quantity}</li>`).join("")}</ul></article>`).join("");
      }

      function renderRecords(items) {
        if (!items.length) return `<div class="rounded-xl border border-dashed border-slate-300 p-4 text-slate-500">Aún no tienes historia clínica registrada.</div>`;
        return items.map((record) => `<article class="rounded-xl border border-slate-200 p-4"><strong>${record.diagnosis || "Consulta médica"}</strong><p class="mt-1 text-slate-500">${record.reason || ""}</p><p class="mt-2"><b>Tratamiento:</b> ${record.prescription || record.treatmentPlan || "Sin tratamiento registrado"}</p></article>`).join("");
      }

      function showAuthMessage(text, type) {
        const box = document.querySelector("#auth-message");
        box.className = `rounded-xl px-4 py-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"}`;
        box.textContent = text;
      }

      function showPortalMessage(text, type) {
        const box = document.querySelector("#portal-message");
        box.className = `rounded-xl px-4 py-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"}`;
        box.textContent = text;
      }
    </script>
  </body>
</html>
